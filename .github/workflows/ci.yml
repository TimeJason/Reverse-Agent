name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install Node dependencies
        run: npx pnpm@11.5.2 install

      - name: Format
        run: npx pnpm@11.5.2 format:check

      - name: Lint
        run: npx pnpm@11.5.2 lint

      - name: Typecheck
        run: npx pnpm@11.5.2 typecheck

      - name: Test
        run: npx pnpm@11.5.2 test

      - name: Build
        run: npx pnpm@11.5.2 build

      - name: Python tests
        run: uv run --project workers/python pytest
